<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#C9A84C">
  <meta name="description" content="The Edge — Proprietary swing trade decision framework">
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Edge">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <title>The Edge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       SCREEN 1 — DASHBOARD
       ═══════════════════════════════════════════ -->
  <div id="screen-dashboard" class="screen active">
    <div class="dash-layout">

      <header class="dash-header">
        <span class="app-name">The Edge</span>
        <span class="app-tagline">Swing Trade Decision System</span>
      </header>

      <main class="market-card">
        <div class="market-date" id="dash-date">—</div>
        <div class="market-time" id="dash-time">—</div>
        <div class="session-badge closed" id="session-badge">
          <span class="session-dot"></span>
          <span id="session-label">Loading…</span>
        </div>
      </main>

      <footer class="dash-cta">
        <button class="btn-cta" id="btn-open-tree">Open Decision Tree</button>
      </footer>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 2 — SWING ENTRY DECISION TREE
       ═══════════════════════════════════════════ -->
  <div id="screen-entry" class="screen">

    <header class="entry-header">
      <button class="btn-back" id="btn-back">‹ Back</button>
      <span class="entry-screen-title">Swing Entry</span>
      <span class="entry-score-live" id="live-score">—</span>
    </header>

    <!-- Hard stop banner — shown when a hard stop option is selected -->
    <div class="hard-stop-banner" id="hard-stop-banner">
      <div class="hard-stop-label">
        <span>⛔</span> Hard Stop Active — No Trade
      </div>
      <div id="hard-stop-reason"></div>
    </div>

    <!-- Layer cards injected here by app.js -->
    <div class="layers-container" id="layers-container"></div>

    <!-- Verdict card — shown when all 8 layers selected and no hard stop -->
    <div class="verdict-card" id="verdict-card">
      <div class="verdict-top">
        <div class="verdict-grade" id="verdict-grade">—</div>
        <div class="verdict-right">
          <span class="verdict-action-label" id="verdict-action">—</span>
          <span class="verdict-action-sub">position sizing</span>
        </div>
      </div>
      <div class="verdict-score-total" id="verdict-score-total">
        — <span class="denom">/ 13</span>
      </div>
      <div class="breakdown-grid" id="verdict-breakdown"></div>
      <button class="btn-reset" id="btn-reset">↺ New Analysis</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
